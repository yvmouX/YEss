name: 发布Releases
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: 提取插件版本号
        id: extract_version
        run: |
          # 从 build.gradle 中提取版本号，并写入环境变量 VERSION
          VERSION=$(grep "^version *= *['\"]" build.gradle | head -n1 | sed "s/.*version *= *['\"]\\(.*\\)['\"].*/\\1/")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 确保 gradlew 可执行
        run: chmod +x ./gradlew

      - name: 构建插件
        run: ./gradlew build

      - name: 获取当前日期
        id: get-date
        run: |
          echo "current-date=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "current-time=$(date '+%H:%M:%S %Z')" >> $GITHUB_OUTPUT

      - name: 生成Git日志
        id: git-log
        run: |
          git_log=$(git log -5 --pretty=format:"- %h %s (%an, %ad)" --date=short)
          echo "full_log=$git_log" >> $GITHUB_OUTPUT

      - name: 生成变更日志
        id: generate_changelog
        run: |
          # 获取所有标签（确保本地有最新标签）
          git fetch --tags
          
          # 获取最新的两个标签（按时间倒序）
          latest_tags=$(git tag --sort=-creatordate | head -n 2)
          previous_tag=$(echo "$latest_tags" | tail -n 1)
          current_tag="v${{ env.VERSION }}"
          
          # 如果存在上一个版本，生成两个版本之间的变更日志
          if [ -n "$previous_tag" ] && [ "$previous_tag" != "$current_tag" ]; then
            changelog=$(git log --pretty=format:"- %h %s (%an, %ad)" --date=short "$previous_tag..HEAD")
          else
            # 如果没有上一个版本（首次发布），显示所有提交
            changelog=$(git log --pretty=format:"- %h %s (%an, %ad)" --date=short)
          fi
          
          echo "changelog=${changelog}" >> $GITHUB_OUTPUT

      - name: 发布到 GitHub Releases
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: "v${{ env.VERSION }}"
          version: "v${{ env.VERSION }}"
          version-type: release
          files: build/libs/*.jar
          changelog: |
            # 🚀 Release v${{ env.VERSION }}

            **Release Date**: ${{ steps.get-date.outputs.current-date }}  

            ## 📦 Changes
            ### What's Changed
            - 

            ### Full changelog
            ${{ steps.generate_changelog.outputs.changelog }}

            ## 👥 Contributors
            - **Committer**: [${{ github.event.head_commit.author.name }}](https://github.com/${{ github.event.head_commit.author.username || 'unknown' }})  

            ## 📜 Version History
            View all releases at [Release Page](https://github.com/${{ github.repository }}/releases)