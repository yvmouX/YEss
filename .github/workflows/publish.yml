name: 发布Releases
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: 提取插件版本号
        id: extract_version
        run: |
          # 从 build.gradle 中提取版本号，并写入环境变量 VERSION
          VERSION=$(grep "^version *= *['\"]" build.gradle | head -n1 | sed "s/.*version *= *['\"]\\(.*\\)['\"].*/\\1/")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 确保 gradlew 可执行
        run: chmod +x ./gradlew

      - name: 构建插件
        run: ./gradlew build

      - name: 获取当前日期
        id: get-date
        run: |
          echo "current-date=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "current-time=$(date '+%H:%M:%S %Z')" >> $GITHUB_OUTPUT

      - name: 获取版本标签
        id: get_tags
        run: |
          git fetch --tags
          current_tag="v${{ env.VERSION }}"
          # 获取上一个非当前版本的标签
          previous_tag=$(git describe --tags --abbrev=0 "$current_tag^" 2>/dev/null || echo "")
          echo "current_tag=${current_tag}" >> $GITHUB_OUTPUT
          echo "previous_tag=${previous_tag}" >> $GITHUB_OUTPUT

      - name: 自动生成 GitHub 风格的 Release Notes
        id: github_release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.request('POST /repos/{owner}/{repo}/releases/generate-notes', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.VERSION}`,
              previous_tag_name: `${{ steps.get_tags.outputs.previous_tag }}`
            });
            core.setOutput('body', response.data.body);

      - name: 生成变更日志
        id: generate_changelog
        run: |
          # 获取仓库URL和标签
          repo_url="https://github.com/${{ github.repository }}"
          current_tag="v${{ env.VERSION }}"
          
          # 获取上一个标签
          git fetch --tags
          previous_tag=$(git describe --tags --abbrev=0 "$current_tag^" 2>/dev/null || echo "")
          
          # 生成完整的变更日志
          if [ -n "$previous_tag" ]; then
            echo "生成变更日志范围: $previous_tag..HEAD"
            full_changelog=$(git log --pretty=format:"- [%h]($repo_url/commit/%H) %s" --no-merges "$previous_tag..HEAD")
          else
            echo "生成完整变更日志 (首次发布)"
            full_changelog=$(git log --pretty=format:"- [%h]($repo_url/commit/%H) %s" --no-merges)
          fi
          
          # 分割日志：前5条和剩余部分
          first_five=$(echo "$full_changelog" | head -n 5)
          remaining=$(echo "$full_changelog" | tail -n +6)
          remaining_count=$(echo "$remaining" | grep -c '^-' || echo 0)
          
          # 组装最终日志
          if [ $remaining_count -gt 0 ]; then
            changelog="$first_five
          <details>
          <summary>Click to expand remaining $remaining_count changes</summary>
    
          $remaining
          </details>"
          else
            changelog="$full_changelog"
          fi
          
          # 输出结果
          delimiter="EOF_$(date +%s)"
          {
            echo "changelog<<$delimiter"
            echo "$changelog"
            echo "$delimiter"
            echo "previous_tag=${previous_tag}"
          } >> $GITHUB_OUTPUT    

      - name: 发布到 GitHub Releases
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: "v${{ env.VERSION }}"
          version: "v${{ env.VERSION }}"
          version-type: release
          files: build/libs/*.jar
          changelog: |
            # 🚀 Release v${{ env.VERSION }}
            **Release Date**: ${{ steps.get-date.outputs.current-date }}

            ## 📝 Commit Message
            ${{ steps.generate_changelog.outputs.changelog }}
            
            ${{ steps.github_release_notes.outputs.body }}

            ## Version History
            View all releases at [Release Page](https://github.com/${{ github.repository }}/releases)