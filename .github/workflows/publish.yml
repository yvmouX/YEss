name: Publish Minecraft Plugin
on:
  push:
    branches: [ main ]  # 仅在 main 分支 push 时触发
  workflow_dispatch:    # 允许手动触发

jobs:
  publish:
    runs-on: ubuntu-latest  # 使用最新版 Ubuntu 作为运行环境
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2  # 只拉取最近两次提交，便于比较变更

      - name: Check if version changed
        id: check-version
        run: |
          # 检查 plugin.yml 或 build.gradle 是否有变更
          if git diff --name-only HEAD^ HEAD | grep -E -q "plugin.yml|build.gradle"; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract version from plugin.yml
        if: steps.check-version.outputs.version_changed == 'true'
        id: extract_version
        run: |
          # 从 plugin.yml 中提取版本号，并写入环境变量 VERSION
          VERSION=$(grep '^version:' src/main/resources/plugin.yml | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build plugin
        if: steps.check-version.outputs.version_changed == 'true'
        run: ./gradlew build  # 使用 Gradle 构建插件

      - name: Publish to GitHub Releases
        if: steps.check-version.outputs.version_changed == 'true'
        uses: Kir-Antipov/mc-publish@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}  # GitHub 自动注入的 Token，用于发布 Release
          github-tag: "v${{ env.VERSION }}"         # 发布的 tag，格式如 v1.0.0
          version: "${{ env.VERSION }}"             # 插件版本号
          version-type: release                      # 发布类型为正式版
          files: build/libs/*.jar                    # 上传的 jar 文件路径
          changelog: |
            ## 变更日志
            $CHANGES