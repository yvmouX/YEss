name: 发布Releases
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须获取全部历史

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: 提取插件版本号
        id: extract_version
        run: |
          # 从 build.gradle 中提取版本号，并写入环境变量 VERSION
          VERSION=$(grep "^version *= *['\"]" build.gradle | head -n1 | sed "s/.*version *= *['\"]\\(.*\\)['\"].*/\\1/")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 确保 gradlew 可执行
        run: chmod +x ./gradlew

      - name: 构建插件
        run: ./gradlew build

      - name: 获取当前日期
        id: get-date
        run: |
          echo "current-date=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "current-time=$(date '+%H:%M:%S %Z')" >> $GITHUB_OUTPUT

      - name: 生成变更日志
        id: generate_changelog
        run: |
          # 获取所有标签（确保本地有最新标签）
          git fetch --tags

          # 获取最新的标签
          current_tag="v${{ env.VERSION }}"
          previous_tag=$(git describe --tags --abbrev=0 "$current_tag^" 2>/dev/null || echo "")
          
          # 调试输出
          echo "Current tag: $current_tag"
          echo "Previous tag: $previous_tag"
          
          # 如果存在上一个版本，生成两个版本之间的变更日志
          if [ -n "$previous_tag" ]; then
            echo "Generating changelog between $previous_tag and HEAD"
            changelog=$(git log --pretty=format:"- %s [%h]" --no-merges "$previous_tag..HEAD")
          else
            # 如果没有找到上一个版本（首次发布），显示所有提交
            echo "Generating full changelog (first release)"
            changelog=$(git log --pretty=format:"- %s [%h]" --no-merges)
          fi
          
          # 格式化输出以便在GitHub Actions中使用
          changelog="${changelog//'%'/'%25'}"
          changelog="${changelog//$'\n'/'%0A'}"
          changelog="${changelog//$'\r'/'%0D'}"
          
          echo "changelog=${changelog}" >> $GITHUB_OUTPUT

      - name: 发布到 GitHub Releases
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: "v${{ env.VERSION }}"
          version: "v${{ env.VERSION }}"
          version-type: release
          files: build/libs/*.jar
          changelog: |
            # 🚀 Release v${{ env.VERSION }}

            **Release Date**: ${{ steps.get-date.outputs.current-date }}

            ## 📦 Changes
            ### What's Changed
            -

            ### Commit Message
            ${{ steps.generate_changelog.outputs.changelog }}

            Full changelog: 

            ## 👥 Contributors
            - **Committer**: [${{ github.event.head_commit.author.name }}](https://github.com/${{ github.event.head_commit.author.username || 'unknown' }})

            ## 📜 Version History
            View all releases at [Release Page](https://github.com/${{ github.repository }}/releases)