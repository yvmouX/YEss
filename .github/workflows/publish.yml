name: 发布Releases
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: 提取插件版本号
        id: extract_version
        run: |
          # 从 build.gradle 中提取版本号，并写入环境变量 VERSION
          VERSION=$(grep "^version *= *['\"]" build.gradle | head -n1 | sed "s/.*version *= *['\"]\\(.*\\)['\"].*/\\1/")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 确保 gradlew 可执行
        run: chmod +x ./gradlew

      - name: 构建插件
        run: ./gradlew build

      - name: 获取当前日期
        id: get-date
        run: |
          echo "current-date=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "current-time=$(date '+%H:%M:%S %Z')" >> $GITHUB_OUTPUT

      - name: 生成Git日志
        id: git-log
        run: |
          git_log=$(git log -5 --pretty=format:"- %h %s (%an, %ad)" --date=short)
          echo "full_log=$git_log" >> $GITHUB_OUTPUT

      - name: 获取上一个版本
        id: get_previous_version
        run: |
          # 使用 GitHub API 获取最近的标签（按创建时间排序）
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/tags?per_page=2")
          
          # 提取第二个标签作为上一个版本（第一个是当前将要创建的）
          previous_version=$(echo "$response" | jq -r '.[1].name')
          echo "previous_version=${previous_version:-none}" >> $GITHUB_OUTPUT

      - name: 生成变更日志
        id: generate_changelog
        run: |
          if [ "${{ steps.get_previous_version.outputs.previous_version }}" != "none" ]; then
            # 获取两个版本之间的提交
            changelog=$(git log --pretty=format:"- %h %s (%an, %ad)" --date=short \
              ${{ steps.get_previous_version.outputs.previous_version }}..HEAD)
            echo "changelog=${changelog}" >> $GITHUB_OUTPUT
          else
            # 如果是第一个版本，获取所有提交
            changelog=$(git log --pretty=format:"- %h %s (%an, %ad)" --date=short)
            echo "changelog=${changelog}" >> $GITHUB_OUTPUT
          fi

      - name: 发布到 GitHub Releases
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: "v${{ env.VERSION }}"
          version: "v${{ env.VERSION }}"
          version-type: release
          files: build/libs/*.jar
          changelog: |
            # 🚀 Release v${{ env.VERSION }}

            **Release Date**: ${{ steps.get-date.outputs.current-date }}  

            ## 📦 Changes
            ### What's Changed
            - 

            ### Full changelog
            ${{ steps.generate_changelog.outputs.changelog }}

            ## 👥 Contributors
            - **Committer**: [${{ github.event.head_commit.author.name }}](https://github.com/${{ github.event.head_commit.author.username || 'unknown' }})  

            ## 📜 Version History
            View all releases at [Release Page](https://github.com/${{ github.repository }}/releases)