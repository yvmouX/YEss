name: 发布Releases
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须获取全部历史

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: 提取插件版本号
        id: extract_version
        run: |
          # 从 build.gradle 中提取版本号，并写入环境变量 VERSION
          VERSION=$(grep "^version *= *['\"]" build.gradle | head -n1 | sed "s/.*version *= *['\"]\\(.*\\)['\"].*/\\1/")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 确保 gradlew 可执行
        run: chmod +x ./gradlew

      - name: 构建插件
        run: ./gradlew build

      - name: 获取当前日期
        id: get-date
        run: |
          echo "current-date=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "current-time=$(date '+%H:%M:%S %Z')" >> $GITHUB_OUTPUT

      - name: 生成变更日志
        id: generate_changelog
        run: |
          # 获取仓库URL和标签
          repo_url="https://github.com/${{ github.repository }}"
          current_tag="v${{ env.VERSION }}"
          
          # 获取上一个标签
          git fetch --tags
          previous_tag=$(git describe --tags --abbrev=0 "$current_tag^" 2>/dev/null || echo "")
          
          # 生成Markdown格式的变更日志
          if [ -n "$previous_tag" ]; then
            echo "生成变更日志范围: $previous_tag..HEAD"
            changelog=$(git log --pretty=format:"- [%h]($repo_url/commit/%H) %s" --no-merges "$previous_tag..HEAD")
          else
            echo "生成完整变更日志 (首次发布)"
            changelog=$(git log --pretty=format:"- [%h]($repo_url/commit/%H) %s" --no-merges)
          fi
          
          # 直接输出多行文本（不再需要URL编码）
          delimiter="EOF_$(date +%s)"
          echo "changelog<<$delimiter" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "$delimiter" >> $GITHUB_OUTPUT
          
          echo "生成的变更日志预览:"
          echo "$changelog"

      - name: 发布到 GitHub Releases
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: "v${{ env.VERSION }}"
          version: "v${{ env.VERSION }}"
          version-type: release
          files: build/libs/*.jar
          changelog: |
            # 🚀 Release v${{ env.VERSION }}

            **Release Date**: ${{ steps.get-date.outputs.current-date }}

            ## 📦 Changes
            ### What's Changed
            -

            ### 📝 Commit Message
            ${{ steps.generate_changelog.outputs.changelog }}

            Full changelog: 

            ## 👥 Contributors
            - **Committer**: [${{ github.event.head_commit.author.name }}](https://github.com/${{ github.event.head_commit.author.username || 'unknown' }})

            ## 📜 Version History
            View all releases at [Release Page](https://github.com/${{ github.repository }}/releases)