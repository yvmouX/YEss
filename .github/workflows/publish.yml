name: 发布Releases
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 提取插件版本号
        id: extract_version
        run: |
          # 从 build.gradle 中提取版本号，并写入环境变量 VERSION
          VERSION=$(grep "^version *= *['\"]" build.gradle | head -n1 | sed "s/.*version *= *['\"]\\(.*\\)['\"].*/\\1/")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 确保 gradlew 可执行
        run: chmod +x ./gradlew

      - name: 构建插件
        run: ./gradlew build

      - name: 获取当前日期
        id: get-date
        run: |
          echo "current-date=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "current-time=$(date '+%H:%M:%S %Z')" >> $GITHUB_OUTPUT

      - name: 生成Git日志
        id: git-log
        run: |
          git_log=$(git log -5 --pretty=format:"- %h %s (%an, %ad)" --date=short)
          echo "full_log=$git_log" >> $GITHUB_OUTPUT

      - name: 发布到 GitHub Releases
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: "v${{ env.VERSION }}"
          version: "v${{ env.VERSION }}"
          version-type: release
          files: build/libs/*.jar
          changelog: |
            # 🚀 Release v${{ env.VERSION }}

            **Release Date**: ${{ steps.get-date.outputs.current-date }}  

            ## 📦 Changes
            ### Latest commit
            ```plaintext
            ${{ github.event.head_commit.message || 'No commit message provided' }}
            ```

            ### Full changelog
            <details>
            <summary>Click to expand</summary>

            ```bash
            ${{ steps.git-log.outputs.full_log || 'No detailed changelog generated' }}
            ```

            </details>

            ## 👥 Contributors
            - **Committer**: [${{ github.event.head_commit.author.name }}](https://github.com/${{ github.event.head_commit.author.username || 'unknown' }})  
            - **Triggered by**: [${{ github.actor }}](https://github.com/${{ github.actor }})  

            ## ⚙️ Build Info
            - **Build Number**: [${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})  
            - **Source Version**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})  
            - **Build Time**: ${{ steps.get-date.outputs.current-time }}  

            ## 📜 Version History
            View all releases at [Release Page](https://github.com/${{ github.repository }}/releases)  
